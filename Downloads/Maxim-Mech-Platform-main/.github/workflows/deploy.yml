name: Deploy to Azure

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-backend:
    name: Build & Deploy to Azure
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: maxim-backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build TypeScript
        run: npm run build

      - name: Push Schema to Production DB
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: maxim-backend/

  health-check:
    name: Verify Post-Deployment Health
    needs: deploy-backend
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Azure to Spin Up
        run: sleep 30

      - name: Run Health Check
        id: health_check
        run: |
          URL="https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/health"
          echo "Checking $URL"
          
          for i in {1..3}; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" $URL || echo "CURL_ERROR")
            
            if [ "$RESPONSE" = "200" ]; then
              BODY=$(curl -s $URL)
              STATUS=$(echo $BODY | jq -r '.status')
              DATABASE=$(echo $BODY | jq -r '.database')
              
              if [ "$STATUS" = "ok" ] && [ "$DATABASE" = "connected" ]; then
                echo "Health check passed!"
                exit 0
              fi
            fi
            
            echo "Attempt $i failed. Retrying in 15 seconds..."
            sleep 15
          done
          
          echo "::warning::Health check failed after 3 attempts. Azure might still be warming up, check logs."
          exit 0
